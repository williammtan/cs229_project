# @package _global_
# K-min calibration sweep with RA: K=0 uses per-trial whitening (zero-shot
# fallback), K>0 fits a Frechet mean from the calibration set. This is the
# first config where K>0 should actually move the needle vs K=0, since the
# linear probe head's calibrate is a no-op.
defaults:
  - override /backbone: cbramod_frozen
  - override /protocol: kmin_calibration
head:
  name: linear_probe
  alpha: 1.0
adapters:
  - name: ra_static
    regularize: 1.0e-5
    target_space: identity
    zero_shot_fallback: per_trial
dataset:
  per_trial_zscore: false
