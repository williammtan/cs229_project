# @package backbone
name: labram_finetune
n_channels: 64
trial_seconds: 4.0
freeze: false
batch_size: 16
n_classes: 4
pretrained_id: braindecode/Labram-Braindecode
input_scale: 1.0e6   # MNE returns volts; pretrained LaBraM expects microvolt-scale EEG.
feature_pool: channel_mean
use_cls_token: false
finetune_train:
  lr: 5.0e-5
  weight_decay: 1.0e-4
  epochs: 15
  patience: 4
  batch_size: 16
  val_frac: 0.1
  seed: 0
  grad_clip: 1.0
  max_train_trials: 8000
